services:
  api:
    build: .
    command: uvicorn src.api:app --host 0.0.0.0 --port 8010
    env_file:
      - .env
    ports:
      - "8010:8010"
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data

  ui:
    build: .
    command: streamlit run ui/app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      - API_BASE=http://api:8010
    ports:
      - "8501:8501"
    depends_on:
      - api